<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>无线文件管理助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f6f8fa; color: #24292e; padding: 12px; line-height: 1.4; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 16px; border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.04); min-height: 85vh; padding-bottom: 80px; }
        .header { margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #e1e4e8; }
        h2 { font-size: 18px; color: #1f2328; display: flex; align-items: center; gap: 8px; }
        .breadcrumb { margin-bottom: 14px; font-size: 13px; color: #57606a; background: #f3f4f6; padding: 10px 12px; border-radius: 8px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .breadcrumb a { text-decoration: none; color: #0969da; font-weight: 500; }
        .action-bar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; padding: 14px; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 10px; }
        .action-row { display: flex; width: 100%; gap: 8px; align-items: center; }
        .action-row form { display: flex; width: 100%; gap: 8px; align-items: center; justify-content: space-between; }
        input[type="file"] { font-size: 13px; color: #57606a; flex-grow: 1; max-width: 65%; }
        input[type="text"] { flex-grow: 1; padding: 8px 12px; border: 1px solid #d0d7de; border-radius: 6px; outline: none; font-size: 14px; height: 36px; -webkit-appearance: none; }
        input[type="text"]:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.15); }
        button { height: 36px; padding: 0 14px; background: #0969da; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; box-shadow: 0 1px 0 rgba(27,31,36,0.1); }
        button:active { opacity: 0.85; }
        .btn-mkdir { background: #1a7f37; }
        .btn-batch-del { background: #cf222e; }
        .btn-batch-down { background: #24292e; }
        .batch-toolbar { position: fixed; bottom: 16px; left: 12px; right: 12px; max-width: 776px; margin: 0 auto; background: rgba(36, 41, 46, 0.95); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); padding: 12px 16px; border-radius: 12px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 999; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .batch-toolbar span { color: #fff; font-size: 13px; font-weight: 500; }
        .batch-btns { display: flex; gap: 8px; }
        .batch-btns button { height: 32px; padding: 0 10px; font-size: 12px; }
        .file-list { border: 1px solid #d0d7de; border-radius: 10px; overflow: hidden; background: #fff; }
        .file-header { display: flex; padding: 10px 14px; background: #f6f8fa; font-weight: 600; font-size: 13px; color: #57606a; border-bottom: 1px solid #d0d7de; }
        .file-row { display: flex; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid #f6f8fa; align-items: center; min-height: 52px; }
        .file-row:last-child { border-bottom: none; }
        .col-cb { width: 35px; display: flex; align-items: center; }
        .col-main { flex-grow: 1; display: flex; align-items: center; gap: 8px; overflow: hidden; padding-right: 8px; }
        .col-action { display: flex; align-items: center; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #0969da; }
        .file-info { text-decoration: none; color: #24292e; font-weight: 500; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; width: 100%; }
        .file-info.dir { color: #9a6700; font-weight: 600; }
        .btn-delete { color: #cf222e; background: none; border: none; cursor: pointer; font-size: 13px; box-shadow: none; padding: 4px 8px; }
        .empty-tip { padding: 40px 20px; text-align: center; color: #8c959f; font-size: 14px; }
        @media (min-width: 600px) {
            body { padding: 20px; }
            .container { padding: 24px; padding-bottom: 24px; }
            .action-bar { flex-direction: row; }
            .action-row { width: auto; }
            .batch-toolbar { position: static; background: #eff6ff; padding: 12px; margin-bottom: 12px; border-radius: 8px; box-shadow: none; border: 1px solid #bfdbfe; }
            .batch-toolbar span { color: #1e40af; }
            .batch-btns button { height: 36px; padding: 0 14px; font-size: 13px; }
        }

        /* 全局遮罩层及 Loading 动画样式 */
        .upload-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .upload-card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); width: 85%; max-width: 400px; text-align: center; }
        .upload-card h3 { font-size: 16px; margin-bottom: 12px; color: #1f2328; }
        .progress-box { background: #eaeef2; border-radius: 6px; height: 12px; width: 100%; overflow: hidden; margin: 15px 0; }
        .progress-bar { background: #2da44e; width: 0%; height: 100%; transition: width 0.1s ease; }
        .upload-status { font-size: 13px; color: #57606a; display: flex; justify-content: space-between; }

        /* 环形旋转动画 */
        .spinner { width: 36px; height: 36px; border: 4px solid #f3f3f3; border-top: 4px solid #0969da; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="upload-overlay" id="uploadOverlay">
    <div class="upload-card">
        <div class="spinner"></div>
        <h3 id="uploadTitle">正在上传文件...</h3>
        <div class="progress-box">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="upload-status">
            <span id="progressPercent">0%</span>
            <span id="uploadDetail">准备中...</span>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <h2>📱 局域网文件管理助手</h2>
    </div>

    <div class="breadcrumb">
        📂 <a href="/">根目录</a>{{.Breadcrumbs}}
    </div>

    <div class="action-bar">
        <div class="action-row">
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="hidden" name="path" id="currentPath" value="{{.CurrentPath}}">
                <input type="file" name="uploadfiles" multiple required id="fileInput">
                <button type="submit" id="uploadBtn">📤 上传</button>
            </form>
        </div>
        <div class="action-row">
            <form action="/mkdir" method="post" style="width: 100%;">
                <input type="hidden" name="path" value="{{.CurrentPath}}">
                <input type="text" name="dirname" placeholder="新建文件夹名称" required>
                <button type="submit" class="btn-mkdir">📁 新建</button>
            </form>
        </div>
    </div>

    <div class="batch-toolbar" id="batchToolbar">
        <span id="selectedCount">已选择 0 项</span>
        <div class="batch-btns">
            <button type="button" class="btn-batch-down" onclick="doBatch('download')">📦 打包</button>
            <button type="button" class="btn-batch-del" onclick="doBatch('delete')">❌ 删除</button>
        </div>
    </div>

    <form id="batchForm" method="post" style="margin:0;">
        <input type="hidden" name="path" value="{{.CurrentPath}}">
        <div class="file-list">
            <div class="file-header">
                <div class="col-cb"><input type="checkbox" id="selectAll"></div>
                <div class="col-main">名称</div>
                <div class="col-action">操作</div>
            </div>

            {{if .NotRoot}}
            <div class="file-row">
                <div class="col-cb"></div>
                <div class="col-main">
                    <a href="/?path={{.ParentPath}}" class="file-info dir">↩️ .. 返回上级目录</a>
                </div>
                <div class="col-action"></div>
            </div>
            {{end}}

            {{range .Files}}
            <div class="file-row">
                <div class="col-cb">
                    <input type="checkbox" name="filenames" value="{{.Name}}" class="file-select">
                </div>
                <div class="col-main">
                    {{if .IsDir}}
                    <a href="/?path={{$.CurrentPath}}/{{.Name}}" class="file-info dir">📁 {{.Name}}</a>
                    {{else}}
                    <a href="/download?path={{$.CurrentPath}}/{{.Name}}" target="_blank" class="file-info">📄 {{.Name}}</a>
                    {{end}}
                </div>
                <div class="col-action">
                    <button type="button" class="btn-delete" onclick="singleDelete('{{.Name}}')">❌</button>
                </div>
            </div>
            {{else}}
            <div class="empty-tip">🍃 空空如也的文件夹 ~</div>
            {{end}}
        </div>
    </form>
</div>

<script>
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.file-select');
    const batchToolbar = document.getElementById('batchToolbar');
    const selectedCount = document.getElementById('selectedCount');
    const batchForm = document.getElementById('batchForm');

    // 上传相关 DOM
    const uploadForm = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const uploadOverlay = document.getElementById('uploadOverlay');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const uploadDetail = document.getElementById('uploadDetail');
    const uploadTitle = document.getElementById('uploadTitle');

    // 核心改造：接管表单提交，改用 XHR 异步上传实现进度监听
    uploadForm.onsubmit = function(e) {
        e.preventDefault(); // 阻止网页默认刷新跳转

        const files = fileInput.files;
        if(files.length === 0) return;

        const formData = new FormData();
        formData.append("path", document.getElementById('currentPath').value);
        for (let i = 0; i < files.length; i++) {
            formData.append("uploadfiles", files[i]);
        }

        const xhr = new XMLHttpRequest();

        // 显示遮罩层
        uploadOverlay.style.display = 'flex';
        uploadTitle.innerText = `正在上传 ${files.length} 个文件...`;

        // 监听上传进度事件
        xhr.upload.onprogress = function(event) {
            if (event.lengthComputable) {
                const percent = Math.round((event.loaded / event.total) * 100);
                progressBar.style.width = percent + '%';
                progressPercent.innerText = percent + '%';

                // 转换单位显示详情
                const loadedMB = (event.loaded / (1024 * 1024)).toFixed(1);
                const totalMB = (event.total / (1024 * 1024)).toFixed(1);
                uploadDetail.innerText = `${loadedMB} MB / ${totalMB} MB`;

                if(percent === 100) {
                    uploadTitle.innerText = "服务器正在写入保存，请稍候...";
                }
            }
        };

        // 上传成功或结束
        xhr.onload = function() {
            if (xhr.status === 200) {
                // 上传成功，刷新当前页面查看新文件
                window.location.reload();
            } else {
                alert('上传失败: ' + xhr.responseText);
                uploadOverlay.style.display = 'none';
            }
        };

        xhr.onerror = function() {
            alert('网络错误，上传中断');
            uploadOverlay.style.display = 'none';
        };

        xhr.open('POST', '/upload', true);
        xhr.send(formData);
    };

    if(selectAll) {
        selectAll.addEventListener('change', function() {
            checkboxes.forEach(cb => cb.checked = this.checked);
            updateToolbar();
        });
    }

    checkboxes.forEach(cb => {
        cb.addEventListener('change', updateToolbar);
    });

    function updateToolbar() {
        const checkedBoxes = document.querySelectorAll('.file-select:checked');
        if (checkedBoxes.length > 0) {
            selectedCount.innerText = `已选择 ${checkedBoxes.length} 项`;
            batchToolbar.style.display = 'flex';
        } else {
            batchToolbar.style.display = 'none';
            if(selectAll) selectAll.checked = false;
        }
    }

    function singleDelete(filename) {
        if (confirm('确定要永久删除该项吗？')) {
            checkboxes.forEach(cb => cb.checked = false);
            const currentCb = Array.from(checkboxes).find(cb => cb.value === filename);
            if(currentCb) currentCb.checked = true;
            batchForm.action = '/batch-delete';
            batchForm.submit();
        }
    }

    function doBatch(action) {
        if (action === 'delete') {
            if (!confirm('确定要永久删除所有选中的项目吗？')) return;
            batchForm.action = '/batch-delete';
            batchForm.submit();
        } else if (action === 'download') {
            batchForm.action = '/batch-download';
            batchForm.submit();
        }
    }
</script>
</body>
</html>
